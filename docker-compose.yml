services:
  db:
    image: postgres:16-alpine
    container_name: cloudynhost-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudynhost
      POSTGRES_PASSWORD: cloudynhost
      POSTGRES_DB: cloudynhost
    ports:
      - "5432:5432"
    volumes:
      - cloudynhost-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudynhost -d cloudynhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional local mail catcher for transactional email testing.
  # UI at http://localhost:8025 , SMTP on 1025 (matches .env defaults).
  mail:
    image: axllent/mailpit:latest
    container_name: cloudynhost-mail
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  cloudynhost-db-data:
